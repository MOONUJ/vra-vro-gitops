resources:
  vm:
    type: Cloud.vSphere.Machine
    metadata:
      layoutPosition:
        - 6
        - 1
    properties:
      isLinux: ${input._metadata_is_linux}
      osName: ${input._metadata_is_ostype}
      name: ${input.displayName}
      displayName: ${input.displayName}
      folderName: ${input._org_code+"/"+input._project_name}
      image: ${input.image}
      cpuCount: ${input.cpu}
      totalMemoryMB: ${input.memory * 1024}
      constraints:
        - tag: ${input._profile_tag_category+":"+input._profile_tag_value}
        - tag: ${input._compute_tag_category+":"+input.cloudZoneTag}
        - tag: ${input._gpu_tag_category+":"+input.gpuModel}
      networks: '${map_by(resource.seg1[*].* + resource.seg2[*].* + resource.seg3[*].* + resource.seg4[*].* + resource.seg5[*].* + resource.seg6[*].* + resource.seg7[*].* + resource.seg8[*].* + resource.seg9[*].* + resource.seg10[*].*, net => {"network":net.id, "assignment":"static","address": net.address ,"primaryAddress":net.primaryAddress,"deviceIndex": net.deviceIndex ,"tags":[{"key": input._segment_type_tag_category, "value": net.tagValue}]})}'
