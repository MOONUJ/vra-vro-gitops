formatVersion: 2
inputs:
  # metadata <static>
  _metadata_main_catalog:
    type: string
    title: Metadata Category
    readOnly: true
    default: VM
  _metadata_catalog:
    type: string
    title: Metadata Catalog
    readOnly: true
    default: GPUVM
  _metadata_resource_type:
    type: string
    title: Metadata Resource Type
    readOnly: true
    default: Cloud.vSphere.Machine
  _metadata_available:
    type: string
    title: Metadata Available
    readOnly: true
    default: bvp vpc member
  _metadata_is_ostype:
    type: string
    title: Metadata OSType
    readOnly: true
    default: rocky
  _metadata_is_linux:
    type: boolean
    title: Metadat is Linux
    readOnly: true
    default: true
  # hidden <static>
  _project_id:
    type: string
    title: Project ID
  _project_name:
    type: string
    title: Project Name
    readOnly: true
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getProjectNameByProjectId?projectId={{_project_id}}
  _profile_tag_value:
    type: string
    title: Profile Tag Value
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getProfileByProjectId?projectId={{_project_id}}
  _org_code:
    type: string
    title: Organization Code
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getOrganizationByProjectId?projectId={{_project_id}}
  _vcenter_hostname:
    type: string
    title: vCenter Host Name
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getVcenterHostname?cloudZoneLink={{cloudZone}}
  _cluster_name:
    type: array
    title: vSphere Cluster Name
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getClusterByMachineInstanceAndCloudZoneLink?machineInstance={{machineInstance}}&cloudZoneLink={{cloudZone}}
  # hidden <admin>
  _compute_tag_category:
    type: string
    title: Compute Tag Category
    default: compute
  _org_tag_category:
    type: string
    title: Organization Tag Category
    default: org
  _profile_tag_category:
    type: string
    title: profile Tag Category
    default: profile
  _segment_tag_category:
    type: string
    title: Segment Tag Category
    default: vpcSegId
  _segment_type_tag_category:
    type: string
    title: Segment Type Tag Category
    default: segType
  _gpu_tag_category:
    type: string
    title: GPU Tag Category
    default: gpuModel
  _root_password:
    type: string
    title: Root Password
    default: changeme
    encrypted: true
  _sudoer_user:
    type: boolean
    title: Allow Sudoer
    default: true
  # user inputs <variable>
  requestMessage:
    type: string
    title: Request Message
  displayName:
    type: string
    title: Display Name
  cloudZone:
    type: string
    title: 클라우드 존
    description: VM을 배포할 클라우드 존을 선택하세요. 프로젝트에 따라 사용 가능한 클라우드 존이 표시됩니다.
    $dynamicEnum: /data/vro-actions/com.gvp.bp.gpuvm/getCloudZoneByProjectId?projectId={{_project_id}}
  cloudZoneTag:
    type: string
    title: 클라우드 존 태그
    description: 클라우드 존의 태그 값이 자동으로 설정됩니다.
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getCloudZoneTagValueByTagCategoryAndCloudZoneLink?category={{_compute_tag_category}}&cloudZoneLink={{cloudZone}}
  machineInstance:
    type: string
    title: Machine Instance Profile
    $dynamicEnum: /data/vro-actions/com.gvp.bp.gpuvm/getMachineInstancesByCloudZoneLink?cloudZoneLink={{cloudZone}}
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getDefaultMachineInstancesByCloudZoneLink?cloudZoneLink={{cloudZone}}
  cpu:
    type: number
    title: cpu
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getCpuByMachineInstanceAndCloudZoneLink?machineInstance={{machineInstance}}&cloudZoneLink={{cloudZone}}
  memory:
    type: number
    title: memory
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getMemoryByMachineInstanceAndCloudZoneLink?machineInstance={{machineInstance}}&cloudZoneLink={{cloudZone}}
  interfaceCount:
    type: number
    title: Interface Count
    default: 1
    minimum: 1
    maximum: 10
  diskSize:
    type: number
    title: Additional Disk (GB)
    default: 0
    minimum: 0
  diskPersistence:
    type: boolean
    title: Persistence
    default: false
  image:
    type: string
    title: Image
    $dynamicEnum: /data/vro-actions/com.gvp.bp.gpuvm/getImages?ostype={{_metadata_is_ostype}}&regionLink={{cloudZone}}&gpuModel={{gpuModel}}
  username:
    type: string
    title: Username
    default: ''
  password:
    type: string
    title: Password
    encrypted: true
    default: ''
  gpuModel:
    type: string
    titile: GPU Model
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getGpuModelByMachineInstanceAndCloudZoneLink?machineInstance={{machineInstance}}&cloudZoneLink={{cloudZone}}
  gpuSize:
    type: string
    title: GPU Size
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getGpuSizeByMachineInstanceAndCloudZoneLink?machineInstance={{machineInstance}}&cloudZoneLink={{cloudZone}}
  gpuProfile: # # 모델 TAG를 가진 compute 리소스에 gpu profile 정보 추출
    type: string
    title: GPU Profile
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getGpuProfileByMachineInstanceAndCloudZoneLink?machineInstance={{machineInstance}}&cloudZoneLink={{cloudZone}}
  gpuDeviceCount:
    type: number
    title: GPU Count
    $dynamicDefault: /data/vro-actions/com.gvp.bp.gpuvm/getGpuDeviceCountByMachineInstanceAndCloudZoneLink?machineInstance={{machineInstance}}&cloudZoneLink={{cloudZone}}
  note:
    type: string
    title: Description For VM Note
    default: ''
